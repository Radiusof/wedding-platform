version: '3.8'

services:
  # Base de données MongoDB
  mongodb:
    image: mongo:7.0
    container_name: wedding-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: wedding_db
    volumes:
      - mongodb_data_dev:/data/db

  # Redis pour la communication inter-services
  redis:
    image: redis:7.2-alpine
    container_name: wedding-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data

volumes:
  mongodb_data_dev:
  redis_data_dev:
